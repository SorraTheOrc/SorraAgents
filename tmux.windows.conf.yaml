session_name: Dev
windows:
  - name: Agents
    cwd: ~/projects/SorraAgents
    panes:
      - cmd: "pi --continue"
        focus: true
      - cmd: "wl tui"
        split:
          dir: vertical
          size_pct: 50
      - cmd: "clear"
        split:
          dir: horizontal
          size_pct: 30
