projectName: Sorra Agents
prefix: SA
autoExport: true
autoSync: false
githubRepo: SorraTheOrc/SorraAgents

# Status/stage compatibility rules
statuses:
  - value: open
    label: Open
  - value: in-progress
    label: In Progress
  - value: input_needed
    label: Input Needed
  - value: blocked
    label: Blocked
  - value: completed
    label: Completed
  - value: deleted
    label: Deleted

stages:
  - value: idea
    label: Idea
  - value: intake_complete
    label: Intake Complete
  - value: plan_complete
    label: Plan Complete
  - value: in_progress
    label: In Progress
  - value: in_review
    label: In Review
  - value: done
    label: Done

statusStageCompatibility:
  open: [idea, intake_complete, plan_complete, in_progress, in_review]
  in-progress: [intake_complete, plan_complete, in_progress]
  input_needed: [idea, intake_complete, plan_complete, in_progress]
  blocked: [idea, intake_complete, plan_complete]
  completed: [in_review, done]
  deleted: [idea, intake_complete, plan_complete, done]
