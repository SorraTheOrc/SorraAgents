# Delegation configuration for the APMA Delegation Planner.
#
# Defines agent-group mappings, capabilities, and rules for assigning
# work-items to agents during delegation planning.
#
# Fields per agent_group:
#   name:         Unique identifier used in delegation plans and assignee fields.
#   display_name: Human-readable label.
#   capabilities: List of work categories this group handles.
#   description:  What this agent-group is responsible for.
#   max_concurrent: Maximum concurrent items (0 = unlimited).
#
# The category_rules section maps work-item categories (from task_templates or
# inferred from content) to the preferred agent-group.

agent_groups:
  - name: analysis-agent
    display_name: Analysis Agent
    capabilities:
      - discovery
      - research
      - analysis
      - spike
    description: >
      Performs discovery, research, and analysis tasks. Reviews codebase,
      identifies risks and dependencies, and produces findings documents.
    max_concurrent: 2

  - name: design-agent
    display_name: Design Agent
    capabilities:
      - design
      - architecture
      - specification
    description: >
      Produces design specifications, architecture documents, and interface
      definitions. Documents trade-offs and design decisions.
    max_concurrent: 1

  - name: dev-agent
    display_name: Development Agent
    capabilities:
      - implementation
      - coding
      - feature
      - bug-fix
      - refactoring
    description: >
      Implements production code following design specifications and project
      conventions. Handles features, bug fixes, and refactoring.
    max_concurrent: 3

  - name: test-agent
    display_name: Test Agent
    capabilities:
      - testing
      - quality
      - validation
    description: >
      Creates and maintains tests (unit, integration, e2e). Validates
      acceptance criteria and ensures test coverage.
    max_concurrent: 2

  - name: docs-agent
    display_name: Documentation Agent
    capabilities:
      - documentation
      - runbook
      - changelog
    description: >
      Authors and maintains documentation including user guides, operator
      runbooks, changelogs, and API references.
    max_concurrent: 2

  - name: devops-agent
    display_name: DevOps Agent
    capabilities:
      - ci
      - deployment
      - containerization
      - infrastructure
    description: >
      Handles CI/CD pipelines, containerization, deployment configurations,
      and infrastructure tasks.
    max_concurrent: 1

# Maps categories to preferred agent-groups.
# If a work-item's category or issue_type matches a key, the corresponding
# agent-group is suggested as the assignee.
category_rules:
  discovery: analysis-agent
  research: analysis-agent
  analysis: analysis-agent
  spike: analysis-agent
  design: design-agent
  architecture: design-agent
  specification: design-agent
  implementation: dev-agent
  feature: dev-agent
  bug: dev-agent
  bug-fix: dev-agent
  refactoring: dev-agent
  chore: dev-agent
  testing: test-agent
  quality: test-agent
  validation: test-agent
  documentation: docs-agent
  runbook: docs-agent
  changelog: docs-agent
  ci: devops-agent
  deployment: devops-agent
  containerization: devops-agent
  infrastructure: devops-agent

# Keyword patterns for inferring category from work-item title/description
# when no explicit category is set.  Each pattern is a list of regex fragments.
category_keywords:
  discovery:
    - "discover"
    - "research"
    - "spike"
    - "investigat"
    - "analys"
    - "explor"
  design:
    - "design"
    - "architect"
    - "spec(?:ification)?"
    - "interface"
    - "schema"
  implementation:
    - "implement"
    - "build"
    - "creat"
    - "develop"
    - "code"
    - "feature"
    - "refactor"
  testing:
    - "test"
    - "validat"
    - "verif"
    - "assert"
    - "coverage"
    - "qa"
  documentation:
    - "doc(?:ument)?"
    - "readme"
    - "runbook"
    - "changelog"
    - "guide"
  ci:
    - "ci[/-]"
    - "pipeline"
    - "deploy"
    - "container"
    - "docker"
    - "infra"
