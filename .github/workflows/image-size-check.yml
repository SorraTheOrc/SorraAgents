name: Image Size Check

on:
  pull_request:
    paths:
      - 'ampa/**'
      - '.github/**'

jobs:
  build-and-check-size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ampa image
        run: |
          docker build -t ampa-dev:ci ampa/

      - name: Get image size
        id: imgsize
        run: |
          size=$(docker image inspect ampa-dev:ci --format '{{.Size}}')
          echo "size=$size" >> $GITHUB_OUTPUT

      - name: Compare to baseline
        run: |
          baseline=$(cat .github/ampa-dev-baseline-size)
          size=${{ steps.imgsize.outputs.size }}
          delta=$((size - baseline))
          echo "baseline=$baseline"; echo "size=$size"; echo "delta=$delta"
          # Threshold: 500,000,000 bytes (~500MB)
          threshold=500000000
          if [ "$delta" -gt "$threshold" ]; then
            echo "Image size increased by $delta bytes which exceeds threshold $threshold bytes" >&2
            exit 1
          fi

      - name: Upload size artifact
        uses: actions/upload-artifact@v4
        with:
          name: ampa-image-size
          path: |
            .github/ampa-dev-baseline-size
            # create a short file with the measured size
            <(printf "%s" "${{ steps.imgsize.outputs.size }}")
