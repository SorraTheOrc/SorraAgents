# dev-smoke — fast sanity checks on every push to the dev branch.
#
# These tests are designed to catch critical problems early and provide
# a clear pass/fail signal in the PR/commit checks UI.
#
# Local equivalent:
#   node --test tests/dev/smoke.mjs

name: dev-smoke

on:
  push:
    branches:
      - dev

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install pytest pyyaml

      - name: Install ripgrep (required by terminology scan)
        run: |
          sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run smoke tests
        run: node --test tests/dev/smoke.mjs
