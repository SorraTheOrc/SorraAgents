name: dev-smoke

on:
  push:
    branches:
      - dev

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html jsonschema pyyaml

      - name: Run smoke tests
        run: pytest tests/dev/test_smoke.py tests/test_check_or_create_critical.py -v -k "smoke or critical" --tb=short --junitxml=test-results-smoke.xml

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results-smoke.xml

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results-smoke.xml
