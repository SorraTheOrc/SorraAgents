name: dev-full-suite

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for running the full suite"
        required: false
        default: "Pre-merge release candidate"
  push:
    branches:
      - 'release-candidate/**'

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html jsonschema pyyaml

      - name: Run full test suite
        run: pytest --tb=short --junitxml=test-results-full.xml --html=test-report.html --self-contained-html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results
          path: |
            test-results-full.xml
            test-report.html

      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results-full.xml

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-logs
          path: |
            .pytest_cache/
            tests/__pycache__/
