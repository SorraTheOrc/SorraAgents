name: ci

on:
  push:
  pull_request:

jobs:
  # Runs the full unit test suite on every push and pull_request.
  # This job is intended to be set as a required status check for branch protection on main.
  # To enable: Settings → Branches → Add rule → Require status checks → select "test".
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # Runs integration tests only on push (not on pull_request) to keep PR feedback fast.
  # Long-running integration tests are excluded from the PR required check.
  integration-isolation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run per-project isolation integration tests
        run: pytest tests/test_per_project_isolation.py -v
